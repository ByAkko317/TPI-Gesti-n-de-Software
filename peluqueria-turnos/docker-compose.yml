services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: peluqueria
      POSTGRES_PASSWORD: peluqueria
      POSTGRES_DB: peluqueria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peluqueria"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://peluqueria:peluqueria@db:5432/peluqueria
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # n8n se agrega en la etapa de automatización.

volumes:
  pgdata: